command-description:
  configure: "Konfigurace Skoice."
  link: "Propojte svůj Discord účet s Minecraftem."
  unlink: "Odpoj svůj Discord účet od Minecraftu."
  invite: "Získej proximity voice chat na svém serveru."
menu:
  contributors-footer: "Skoice • carlodrift, Lucas_Cdry a přispěvatelé"
  configuration:
    title: "Konfigurace"
  server:
    title: "Server"
    select-menu:
      placeholder: "Prosím, vyber server."
  two-factor-authentication:
    title: "Dvoufaktorové ověření"
    description: "Tvůj Discord server vyžaduje, aby účet majitele bota měl povolené dvoufaktorové ověřování. Nastavte 2FA nebo zakažte tento požadavek v nastavení serveru touto cestou: `Moderace › Nastavení bezpečnosti › (Oprávnění ›) Vyžadovat 2FA pro moderátorské akce."
  permissions:
    title: "Oprávnění"
  voice-chat:
    title: "Hlasový chat"
  range:
    title: "Dosah"
    description: "Přizpůsob si dosah proximity voice chatu."
    select-menu:
      placeholder: "Prosím vyber dosah."
      select-option:
        long-range-mode:
          label: "Režim dlouhého dosahu"
        short-range-mode:
          label: "Krátký dosah"
        customized:
          label: "Přizpůsobený"
        description: "Horizontální radius: {horizontal-radius} bloků – Vertikální radius: {vertical-radius} bloků"
  active-worlds:
    title: "Aktivní světy"
    description: "Vyber světy, ve kterých je Skoice aktivní."
    select-menu:
      placeholder: "Vyber prosím požadované světy."
  included-players:
    title: "Zahrnutí hráči"
    select-menu:
      spectators-included:
        label: "Spectatoři"
  discord-integration:
    title: "Integrace s Discordem"
  voice-channel:
    title: "Hlasový kanál"
    select-menu:
      placeholder: "Vyberte prosím hlasový kanál."
      select-option:
        new-voice-channel:
          label: "Nový hlasový kanál"
          description: "Skoice automaticky nastaví hlasový kanál."
  text-chat:
    title: "Textový Chat"
  in-game-messages:
    title: "Zprávy ve hře"
  login-notification:
    title: "Notifikace o přihlášení"
    description: "Přepne zprávu odeslanou hráčům, kteří nepropojili své účty, když se přihlásí na váš Minecraft server."
    select-menu:
      always-remind:
        label: "Vždy připomenout"
  language:
    title: "Jazyk"
    description: "Vyberte jazyk použitý k zobrazení zpráv. Tvůj jazyk chybí nebo je neúplný? [Přeložte náš plugin pomoci Crowdin]({crowdin-url})!"
  skoice-proximity-voice-chat:
    title: "Skoice: Proximity Voice Chat (Hlasový chat v bezprostřední blízkosti)"
  error:
    title: "Chyba"
field:
  long-range-mode:
    title: "Režim dlouhého dosahu"
  short-range-mode:
    title: "Krátký dosah"
  customized:
    title: "Přizpůsobený"
