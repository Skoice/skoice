    no-guild-interactive: "ボットが{error-color}Discordサーバーに存在しません{default-color}。{open:bot-invite-url}を開いて招待してください。次に、{run:configure-minecraft-command}をクリックしてセットアップしてください。このメッセージと対話できない場合は、「{tooltips-minecraft-command}」と入力してください。"
    no-guild: "ボットが{error-color}Discordサーバーに存在しません{default-color}。このページを開いて招待してください：{bot-invite-url}。次に、「{configure-minecraft-command}」と入力してセットアップしてください。"
