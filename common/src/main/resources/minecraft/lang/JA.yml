logger:
  info:
    plugin-enabled: "プラグインが有効になりました。"
    plugin-disabled: "プラグインが無効になりました。"
    plugin-updated: "Skoiceは最新バージョンに更新されました。変更を適用するには、Minecraftサーバーを再起動してください。"
    skoice-3: "Skoice 3を使用しています。ボットを正しく動作させるには、こちらの移行ガイドに従ってください：{migration-guide-url}。"
    configuration-complete: "Skoiceが構成されました。Discordサーバーで「{link-discord-command}」を入力して、DiscordアカウントをMinecraftにリンクしてください。プレイヤーは近接音声チャットを使用するためにアカウントをリンクする必要があります。"
  warning:
    outdated-version: "古いバージョン（{current-version}）を使用しています。最新バージョン（{latest-version}）をこちらからダウンロードしてください：{spigotmc-url}。"
    no-token: "トークンが設定されていません。Minecraftサーバーに参加して、Skoiceを設定してください。"
    multiple-guilds: "あなたのbotは複数のDiscordサーバーにいます。Discordサーバーで「{configure-discord-command}」と入力し、1つを選択してください。"
    two-factor-authentication: "二要素認証が必要です。ボット所有者のアカウントで二要素認証を有効にするか、サーバー設定で「モデレーターアクションに2FAを要求する」を無効にしてください。"
    no-voice-channel: "ボイスチャンネルが設定されていません。Discordサーバーで「{configure-discord-command}」と入力し、Skoiceを設定してください。"
    no-radius: "範囲が設定されていません。「{configure-discord-command}」をDiscordサーバーで入力して、Skoiceを設定してください。"
    missing-permission: "Discordサーバーでボットに「管理者」権限を付与していません。次のリンクを開いて追加してください：{bot-invite-url}。"
    invalid-bot: "ボットが正しく構成されていません。Minecraftサーバーに参加して新しいボットを作成してください。"
    shared-bot: "ボットが複数のプログラムを実行しているようです。ただし、正しく動作するにはSkoice専用である必要があります。このページの手順に従って新しいボットを作成できます：{creation-guide-url}。トークンを取得したら、「{token-minecraft-command}」に続けてトークンを入力してください。"
chat:
  configuration:
    discord-integration-interactive: " \n設定：{title-color}Discord連携\n \n{dark-color}• {default-color}SkoiceにはDiscordボットが必要です。簡単にセットアップするには、{open:creation-guide-url}の手順に従ってください。\n{dark-color}• {default-color}トークンを取得したら、{suggest:token-minecraft-command}に挿入してください。\n \nこのメッセージと対話できない場合は、「{tooltips-minecraft-command}」と入力してください。\n "
    discord-integration: " \n設定：{title-color}Discord連携\n \n{dark-color}• {default-color}SkoiceにはDiscordボットが必要です。簡単にセットアップするには、このページの手順に従ってください：{creation-guide-url}。\n{dark-color}• {default-color}トークンを取得したら、「{token-minecraft-command}」に続けてトークンを入力してください。\n "
