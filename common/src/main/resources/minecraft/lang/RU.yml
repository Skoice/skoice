    invalid-bot: "Ваш бот {error-color}настроен неправильно{default-color}. Пожалуйста, следуйте инструкциям снова, чтобы создать нового."
    public-bot-interactive: "Ваш бот {error-color}настроен неправильно{default-color}. Запустите команду снова после того, как снимите галочку с \"Public Bot\" и нажмёте \"Save Changes\" на {open:bot-page-url}. Если вы не можете взаимодействовать с этим сообщением, введите \"{tooltips-minecraft-command}\"."
    public-bot: "Ваш бот {error-color}настроен неправильно{default-color}. Запустите команду снова после того, как снимите галочку с \"Public Bot\" и нажмёте \"Save Changes\" на этой странице: {bot-page-url}."
