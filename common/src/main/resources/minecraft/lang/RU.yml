    incomplete-configuration-operator-interactive: "Skoice {error-color}настроен некорректно{default-color}. Нажмите {run:configure-minecraft-command} чтобы настроить его. Вы можете изменить язык, нажав {suggest:language-minecraft-command}. Если вы не можете взаимодействовать с этим сообщением, введите \"{tooltips-minecraft-command}\"."
