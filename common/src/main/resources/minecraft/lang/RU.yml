logger:
  info:
    plugin-enabled: "Плагин включен."
    plugin-disabled: "Плагин отключен."
    plugin-updated: "Skoice был обновлен до последней версии. Пожалуйста, перезапустите ваш сервер Minecraft, чтобы применить изменения."
    skoice-3: "Теперь вы используете Skoice 3. Чтобы ваш бот работал правильно, следуйте нашему руководству по миграции здесь: {migration-guide-url}."
    configuration-complete: "Skoice настроен. Введите \"{link-discord-command}\" на вашем сервере Discord, чтобы привязать вашу учётную запись Discord к Minecraft. Игроки должны привязать свои учётные записи для использования голосового чата близости."
  warning:
    outdated-version: "Вы используете устаревшую версию ({current-version}). Загрузите последнюю версию ({latest-version}) здесь: {spigotmc-url}."
    no-token: "Токен не установлен. Присоединитесь к серверу Minecraft, чтобы настроить Skoice."
    multiple-guilds: "Ваш бот на нескольких Discord серверах. Введите \"{configure-discord-command}\" на вашем Discord сервере, чтобы выбрать его."
    two-factor-authentication: "Требуется двухфакторная аутентификация. Включите двухфакторную аутентификацию на аккаунте владельца бота или отключите \"Требовать 2FA для действий модератора\" в настройках сервера."
    no-voice-channel: "Голосовой канал не установлен. Введите \"{configure-discord-command}\" на вашем сервере Discord, чтобы настроить Skoice."
    no-radius: "Радиус не установлен. Введите \"{configure-discord-command}\" на вашем сервере Discord, чтобы настроить Skoice."
    missing-permission: "Вы не предоставили вашему боту разрешение \"Администратор\" на сервере Discord. Откройте эту ссылку, чтобы добавить его: {bot-invite-url}."
    invalid-bot: "Ваш бот настроен неправильно. Присоединитесь к вашему серверу Minecraft, чтобы создать нового."
    shared-bot: "Похоже, ваш бот запускает несколько программ. Однако он должен быть предназначен исключительно для Skoice, чтобы работать правильно. Вы можете создать новый, следуя инструкциям на этой странице: {creation-guide-url}. После получения токена введите \"{token-minecraft-command}\", а затем токен."
chat:
  configuration:
    discord-integration-interactive: " \nКонфигурация: {title-color}Интеграция с Discord\n \n{dark-color}• {default-color}Для работы Skoice нужен бот Discord. Чтобы легко настроить его, следуйте инструкциям на {open:creation-guide-url}.\n{dark-color}• {default-color}После получения токена вставьте его {suggest:token-minecraft-command}.\n \nЕсли вы не можете взаимодействовать с этим сообщением, введите \"{tooltips-minecraft-command}\".\n "
    discord-integration: " \nКонфигурация: {title-color}Интеграция с Discord\n \n{dark-color}• {default-color}Для работы Skoice нужен бот Discord. Чтобы легко настроить его, следуйте инструкциям на этой странице: {creation-guide-url}.\n{dark-color}• {default-color}После получения токена введите \"{token-minecraft-command}\", а затем токен.\n "
    no-token: "Вы {error-color}не указали токен{default-color}. Чтобы использовать эту команду, введите \"{token-minecraft-command}\", а затем токен бота."
    no-guild-interactive: "Ваш бот {error-color}не находится на сервере Discord{default-color}. Откройте {open:bot-invite-url}, чтобы пригласить его. Затем нажмите {run:configure-minecraft-command}, чтобы настроить его. Если вы не можете взаимодействовать с этим сообщением, введите \"{tooltips-minecraft-command}\"."
    no-guild: "Ваш бот {error-color}не находится на сервере Discord{default-color}. Откройте эту страницу, чтобы пригласить его: {bot-invite-url}. Затем введите \"{configure-minecraft-command}\", чтобы настроить его."
