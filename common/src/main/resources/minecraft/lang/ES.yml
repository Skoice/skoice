    account-unlinked: "Has {success-color}desvinculado tu cuenta de Minecraft {default-color}de Discord."
    account-not-linked: "{error-color}No has vinculado tu cuenta de Minecraft {default-color}con Discord. Escribe \"{link-discord-command}\" en el servidor de Discord \"{guild}\" para vincularla y usar el chat de voz de proximidad."
    account-not-linked-remind-once: "{error-color}No has vinculado tu cuenta de Minecraft {default-color}con Discord. Escribe \"{link-discord-command}\" en el servidor de Discord \"{guild}\" para vincularla y usar el chat de voz de proximidad. No recibirás esta notificación de nuevo."
