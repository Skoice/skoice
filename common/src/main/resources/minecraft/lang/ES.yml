chat:
  configuration:
    discord-integration-interactive: " \nConfiguración: {title-color}Integración con Discord\n \n{dark-color}• {default-color}Skoice necesita un bot de Discord para funcionar. Para configurar uno fácilmente, sigue las instrucciones en {open:creation-guide-url}.\n{dark-color}• {default-color}Una vez que hayas obtenido su token, insértalo en {suggest:token-minecraft-command}.\n \nSi no puedes interactuar con este mensaje, escribe \"{tooltips-minecraft-command}\".\n "
    discord-integration: " \nConfiguración: {title-color}Integración con Discord\n \n{dark-color}• {default-color}Skoice necesita un bot de Discord para funcionar. Para configurar uno fácilmente, sigue las instrucciones en esta página: {creation-guide-url}.\n{dark-color}• {default-color}Una vez que hayas obtenido su token, escribe \"{token-minecraft-command}\" seguido del token.\n "
    no-token: "{error-color}No has proporcionado un token{default-color}. Para usar este comando, escribe \"{token-minecraft-command}\" seguido del token."
    no-guild-interactive: "Tu bot {error-color}no está en un servidor de Discord{default-color}. Abre {open:bot-invite-url} para invitarlo. Luego, haz clic en {run:configure-minecraft-command} para configurarlo. Si no puedes interactuar con este mensaje, escribe \"{tooltips-minecraft-command}\"."
    no-guild: "Tu bot {error-color}no está en un servidor de Discord{default-color}. Abre esta página para invitarlo: {bot-invite-url}. Luego, escribe \"{configure-minecraft-command}\" para configurarlo."
