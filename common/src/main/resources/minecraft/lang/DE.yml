    no-guild: "Dein Bot ist {error-color}auf keinem Discord-Server{default-color}. Öffne diese Seite, um ihn einzuladen: {bot-invite-url}. Gib dann \"{configure-minecraft-command}\" ein, um ihn einzurichten."
