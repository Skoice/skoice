logger:
  info:
    plugin-enabled: "Plugin aktiviert."
    plugin-disabled: "Plugin deaktiviert."
    plugin-updated: "Skoice wurde auf die neueste Version aktualisiert. Bitte starte deinen Minecraft-Server neu, um die Änderungen zu übernehmen."
    skoice-3: "Du benutzt jetzt Skoice 3. Um deinen Bot richtig zum Laufen zu bringen, folge unserem Migrations-Leitfaden hier: {migration-guide-url}."
    configuration-complete: "Skoice ist jetzt konfiguriert. Gib \"{link-discord-command}\" auf deinem Discord-Server ein, um dein Discord-Konto mit Minecraft zu verknüpfen. Spieler müssen ihre Konten verknüpfen, um den Sprachchat im Nahbereich zu nutzen."
  warning:
    outdated-version: "Du benutzt eine veraltete Version ({current-version}). Lade die neueste Version ({latest-version}) hier herunter: {spigotmc-url}."
    no-token: "Token nicht gesetzt. Tritt deinem Minecraft-Server bei, um Skoice einzurichten."
    multiple-guilds: "Dein Bot befindet sich auf mehreren Discord-Servern. Gib \"{configure-discord-command}\" auf deinem Discord-Server ein, um einen auszuwählen."
    two-factor-authentication: "Zwei-Faktor-Authentifizierung erforderlich. Aktiviere die Zwei-Faktor-Authentifizierung für das Konto des Bot-Besitzers oder deaktiviere \"2FA für Moderations-Aktionen erforderlich\" in den Servereinstellungen."
    no-voice-channel: "Sprachkanal nicht eingestellt. Gib \"{configure-discord-command}\" auf deinem Discord-Server ein, um Skoice einzurichten."
    no-radius: "Radius nicht eingestellt. Gib \"{configure-discord-command}\" auf deinem Discord-Server ein, um Skoice einzurichten."
    missing-permission: "Du hast deinem Bot nicht die Berechtigung \"Administrator\" auf deinem Discord-Server erteilt. Öffne diesen Link, um sie hinzuzufügen: {bot-invite-url}."
    invalid-bot: "Dein Bot ist nicht korrekt konfiguriert. Tritt deinem Minecraft-Server bei, um einen neuen zu erstellen."
    shared-bot: "Es scheint, dass dein Bot mehrere Programme ausführt. Er muss jedoch Skoice gewidmet sein, um richtig zu funktionieren. Du kannst einen neuen erstellen, indem du den Anweisungen auf dieser Seite folgst: {creation-guide-url}. Sobald du seinen Token abgerufen hast, gib \"{token-minecraft-command}\" gefolgt vom Token ein."
chat:
  configuration:
    discord-integration-interactive: " \nKonfiguration: {title-color}Discord-Integration\n \n{dark-color}• {default-color}Skoice benötigt einen Discord-Bot, um zu funktionieren. Um einen einfach einzurichten, folge den Anweisungen auf {open:creation-guide-url}.\n{dark-color}• {default-color}Sobald du seinen Token abgerufen hast, füge ihn ein {suggest:token-minecraft-command}.\n \nWenn du mit dieser Nachricht nicht interagieren kannst, gib \"{tooltips-minecraft-command}\" ein.\n "
    discord-integration: " \nKonfiguration: {title-color}Discord-Integration\n \n{dark-color}• {default-color}Skoice benötigt einen Discord-Bot, um zu funktionieren. Um einen einfach einzurichten, folge den Anweisungen auf dieser Seite: {creation-guide-url}.\n{dark-color}• {default-color}Sobald du seinen Token abgerufen hast, gib \"{token-minecraft-command}\" gefolgt vom Token ein.\n "
