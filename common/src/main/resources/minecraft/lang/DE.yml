    account-not-linked-remind-once: "Du hast deinen Minecraft-Account {error-color}nicht mit Discord verknüpft{default-color}. Gib \"{link-discord-command}\" auf dem Discord-Server \"{guild}\" ein, um ihn zu verknüpfen und den Sprachchat im Nahbereich zu nutzen. Du wirst diese Nachricht nicht erneut erhalten."
