logger:
  info:
    plugin-enabled: "Plugin włączony."
    plugin-disabled: "Plugin wyłączony."
    plugin-updated: "Skoice został zaktualizowany do najnowszej wersji. Uruchom ponownie swój serwer Minecraft, aby zastosować zmiany."
    skoice-3: "Teraz używasz Skoice 3. Aby twój bot działał prawidłowo, postępuj zgodnie z naszym przewodnikiem migracji tutaj: {migration-guide-url}."
    configuration-complete: "Skoice został skonfigurowany. Wpisz \"{link-discord-command}\" na swoim serwerze Discord, aby połączyć swoje konto Discord z Minecraft. Gracze muszą połączyć swoje konta, aby korzystać ze zbliżeniowego czatu głosowego."
  warning:
    outdated-version: "Używasz przestarzałej wersji ({current-version}). Pobierz najnowszą wersję ({latest-version}) tutaj: {spigotmc-url}."
    no-token: "Token nie ustawiony. Dołącz do swojego serwera Minecraft, aby skonfigurować Skoice."
    multiple-guilds: "Twój bot jest na kilku serwerach Discord. Wpisz \"{configure-discord-command}\" na swoim serwerze Discord, aby wybrać jeden."
    two-factor-authentication: "Wymagane uwierzytelnianie dwuskładnikowe. Włącz uwierzytelnianie dwuskładnikowe na koncie właściciela bota lub wyłącz \"Wymagaj 2FA do działań moderatorskich\" w ustawieniach serwera."
    no-voice-channel: "Kanał głosowy nie został ustawiony. Wpisz \"{configure-discord-command}\" na swoim serwerze Discord, aby skonfigurować Skoice."
    no-radius: "Zasięg nie został ustawiony. Wpisz \"{configure-discord-command}\" na swoim serwerze Discord, aby skonfigurować Skoice."
    missing-permission: "Twój bot nie ma nadanej permisji \"Administrator\" na twoim serwerze Discord. Otwórz ten link, żeby ją nadać: {bot-invite-url}."
    invalid-bot: "Twój bot nie jest poprawnie skonfigurowany. Dołącz do swojego serwera Minecraft, aby utworzyć nowy."
    shared-bot: "Wygląda na to, że twój bot uruchamia wiele programów. Jednak musi być dedykowany Skoice, aby działać prawidłowo. Możesz utworzyć nowy, postępując zgodnie z instrukcjami na tej stronie: {creation-guide-url}. Po pobraniu jego tokena wpisz \"{token-minecraft-command}\", a następnie token."
