logger:
  info:
    plugin-enabled: "Đã bật plugin."
    plugin-disabled: "Đã tắt plugin."
    plugin-updated: "Skoice đã được cập nhật lên phiên bản mới nhất. Vui lòng khởi động lại máy chủ Minecraft của bạn để áp dụng các thay đổi."
    skoice-3: "Hiện tại bạn đang sử dụng Skoice 3. Để bot của bạn hoạt động bình thường, hãy làm theo hướng dẫn di chuyển của chúng tôi tại đây: {migration-guide-url}."
    configuration-complete: "Skoice hiện đã được cấu hình. Nhập \"{link-discord-command}\" trên máy chủ Discord của bạn để liên kết tài khoản Discord của bạn với Minecraft. Người chơi phải liên kết tài khoản của họ để sử dụng tính năng trò chuyện thoại gần."
  warning:
    outdated-version: "Bạn đang sử dụng phiên bản cũ ({current-version}). Tải xuống phiên bản mới nhất ({latest-version}) tại đây: {spigotmc-url}."
    no-token: "Token chưa được thiết lập. Hãy tham gia máy chủ Minecraft của bạn để thiết lập Skoice."
    multiple-guilds: "Bot của bạn đang ở nhiều máy chủ Discord. Nhập \"{configure-discord-command}\" trên máy chủ Discord của bạn để chọn một máy chủ."
    two-factor-authentication: "Yêu cầu xác thực hai yếu tố. Bật xác thực hai yếu tố trên tài khoản của chủ sở hữu bot hoặc tắt tùy chọn \"Yêu cầu xác thực hai yếu tố cho hành động của người kiểm duyệt\" trong cài đặt máy chủ."
    no-voice-channel: "Kênh thoại chưa được thiết lập. Nhập \"{configure-discord-command}\" trên máy chủ Discord của bạn để thiết lập Skoice."
    no-radius: "Bán kính chưa được thiết lập. Nhập \"{configure-discord-command}\" trên máy chủ Discord của bạn để thiết lập Skoice."
    missing-permission: "Bạn chưa cấp quyền \"Quản trị viên\" cho bot trên máy chủ Discord của mình. Hãy mở liên kết này để thêm quyền: {bot-invite-url}."
    invalid-bot: "Bot của bạn chưa được cấu hình đúng. Hãy tham gia máy chủ Minecraft của bạn để tạo một bot mới."
    shared-bot: "Có vẻ như bot của bạn đang chạy nhiều chương trình. Tuy nhiên, nó phải được dành riêng cho Skoice để hoạt động bình thường. Bạn có thể tạo một bot mới bằng cách làm theo hướng dẫn trên trang này: {creation-guide-url}. Sau khi bạn đã lấy được token, nhập \"{token-minecraft-command}\" theo sau là token."
